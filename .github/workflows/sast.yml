name: SAST

on:
  push:
  pull_request:

jobs:
  static-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Template SAST gate
        run: |
          echo "This template keeps the SAST job vendor-neutral."
          echo "Connect SonarCloud, CodeQL, or another scanner in a real repository."
          test -f pom.xml
          test -d src/main/java

