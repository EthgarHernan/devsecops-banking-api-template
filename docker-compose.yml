services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: banking_template
      POSTGRES_USER: banking_template
      POSTGRES_PASSWORD: local_demo_only
    ports:
      - "55433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    depends_on:
      - postgres
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/banking_template
      DB_USERNAME: banking_template
      DB_PASSWORD: local_demo_only
      DEMO_BASIC_USER: demo-user
      DEMO_BASIC_PASSWORD: local_demo_only
    ports:
      - "8080:8080"

volumes:
  postgres_data:

