server:
  port: 8080

spring:
  application:
    name: devsecops-banking-api-template
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:55433/banking_template}
    username: ${DB_USERNAME:banking_template}
    password: ${DB_PASSWORD:local_demo_only}
  flyway:
    enabled: true
    locations: classpath:db/migration

security:
  demo:
    username: ${DEMO_BASIC_USER:demo-user}
    password: ${DEMO_BASIC_PASSWORD:local_demo_only}

logging:
  level:
    root: INFO
    com.example.banking: INFO

